<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Birthday Nail Challenge</title>
</head>
<body>
    <h1>Welcome to the Birthday Nail Challenge!</h1>
    <div id="birthday-card">
        <input type="text" id="name-input" placeholder="Enter your name">
        <button id="celebrate-button">Celebrate!</button>
        <div id="lyrics-display" style="display:none;">
            <p>Happy Birthday to you!</p>
            <p>Happy Birthday to you!</p>
            <p>Happy Birthday dear <span id="name-placeholder"></span>!</p>
            <p>Happy Birthday to you!</p>
        </div>
    </div>
    <div id="spinning-wheels">
        <canvas id="length-wheel"></canvas>
        <canvas id="shape-wheel"></canvas>
        <canvas id="color-wheel"></canvas>
        <canvas id="style-wheel"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
